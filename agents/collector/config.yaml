# Configuration de l'agent de collecte.
# Ce fichier est le SEUL endroit a modifier pour deployer l'agent sur une
# autre machine (CTU-AUTH, CTU-WEB, ...). Le code Python reste identique.

# URL de l'API qui recoit les logs (le mock local en attendant la vraie API FastAPI).
# En HTTPS : le mock server tourne avec un certificat auto-signe (voir certs/README.md).
server_url: "https://192.168.6.1:8000/api/v1/logs"

# Chemin vers le certificat du serveur, necessaire car il est auto-signe
# (pas emis par une CA reconnue). A retirer/laisser vide quand on basculera
# sur la vraie API avec un certificat valide (Let's Encrypt ou CA interne).
ca_cert: "certs/mock_server.crt"

# Identite de la machine sur laquelle tourne l'agent.
# Ces valeurs sont mises dans chaque log envoye (champs "host" et "dest_ip").
host: "ctu-auth"
dest_ip: "192.168.6.10"

# Liste des fichiers a surveiller, avec le parser a utiliser pour chacun.
# "parser" doit correspondre a une classe definie dans le dossier parsers/.
watched_files:
  - path: "/var/log/auth.log"
    parser: "auth"

# Resilience reseau : si l'envoi vers server_url echoue, les logs sont
# stockes ici et renvoyes automatiquement a la prochaine tentative reussie.
queue_file: "/var/log/siem-agent/queue.jsonl"

# Delai (en secondes) entre deux tentatives de renvoi de la file d'attente.
retry_interval: 10
