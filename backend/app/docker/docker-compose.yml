version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: siem_postgres
    environment:
      POSTGRES_DB:       smart_siem
      POSTGRES_USER:     siem_user
      POSTGRES_PASSWORD: siem_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem_user -d smart_siem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: siem_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # Désactivé pour le dev local
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Smart SIEM API ──────────────────────────────────────────────────────────
  siem_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: siem_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://siem_user:siem_password@postgres:5432/smart_siem
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ..:/app

volumes:
  pg_data:
  es_data: