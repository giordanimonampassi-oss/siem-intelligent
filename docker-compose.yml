# ═══════════════════════════════════════════════════════════════════════════
#  Smart SIEM – Stack Docker
#  Services : PostgreSQL · Elasticsearch · Python backend (init DB) · pgAdmin
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: siem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siem_password}
      POSTGRES_DB: ${POSTGRES_DB:-siem_db}
    ports:
      # Modification ici : routage vers le port 5433 de l'hôte pour éviter le conflit Windows
      - "0.0.0.0:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siem_user} -d ${POSTGRES_DB:-siem_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - siem_net

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: siem_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=siem-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "0.0.0.0:${ES_PORT:-9200}:9200"
      - "0.0.0.0:9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - siem_net

  # ── Python Backend (init DB) ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem_backend
    restart: on-failure
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - siem_net
    volumes:
      - .:/siem

  # ── pgAdmin (interface graphique PostgreSQL) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: siem_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@siem.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "0.0.0.0:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - siem_net

# ── Volumes persistants ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  es_data:
    driver: local
  pgadmin_data:
    driver: local

# ── Réseau interne ─────────────────────────────────────────────────────────
networks:
  siem_net:
    driver: bridge